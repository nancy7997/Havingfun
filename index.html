<head>

        :root {
            --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
            --border: #30363d; --text: #e6edf3; --text2: #8b949e;
            --accent: #f0c040; --win: #238636; --loss: #da3633;
            --draw: #8b949e; --highlight: #1f2a37;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; line-height: 1.4;
        }
        header {
            background: var(--surface); border-bottom: 2px solid var(--accent);
            padding: 12px 20px; text-align: center; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        header h1 { font-size: 1.6em; letter-spacing: 1px; color: var(--accent); }
        header .subtitle { font-size: .75em; color: var(--text2); margin-top: 2px; }
        .calendar-wrap {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 8px 0; position: sticky; top: 72px; z-index: 99;
            overflow-x: auto; white-space: nowrap;
        }
        .calendar-strip { display: flex; gap: 4px; padding: 0 12px; min-width: fit-content; }
        .cal-day {
            flex: 0 0 44px; height: 52px; border-radius: 8px;
            background: var(--surface2); border: 1px solid var(--border);
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: .7em; transition: all .15s; user-select: none; position: relative;
        }
        .cal-day:hover { border-color: var(--accent); background: var(--highlight); }
        .cal-day.has-games { border-color: var(--accent); background: #2a2210; }
        .cal-day.has-games::after {
            content: ''; position: absolute; bottom: 4px; width: 5px; height: 5px;
            border-radius: 50%; background: var(--accent);
        }
        .cal-day.selected { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }
        .cal-day.selected::after { background: #000; }
        .cal-day.today { border: 2px solid #ff6b6b; box-shadow: 0 0 8px rgba(255,107,107,0.5); }
        .cal-day .day-num { font-size: 1.2em; font-weight: 700; line-height: 1; }
        .cal-day .day-mon { font-size: .65em; text-transform: uppercase; opacity: .8; }
        .tabs { display: flex; gap: 0; padding: 0 16px; margin: 10px 0; flex-wrap: wrap; }
        .tab-btn {
            padding: 10px 20px; border: 1px solid var(--border); background: var(--surface2);
            color: var(--text); cursor: pointer; font-size: .9em; font-weight: 600;
            transition: all .15s; border-radius: 6px 6px 0 0; margin-right: -1px;
        }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .tab-btn:hover:not(.active) { background: var(--highlight); border-color: var(--accent); }
        .content { padding: 8px 12px 40px; max-width: 1400px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }
        .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 12px; }
        .group-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
        }
        .group-card h3 {
            background: var(--surface2); padding: 10px 14px; font-size: .95em;
            letter-spacing: 1px; border-bottom: 1px solid var(--border); color: var(--accent);
        }
        .group-standings { width: 100%; border-collapse: collapse; font-size: .78em; }
        .group-standings th {
            background: var(--surface2); padding: 6px 4px; text-align: center;
            font-size: .75em; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border);
        }
        .group-standings th:first-child { text-align: left; padding-left: 10px; }
        .group-standings td { padding: 6px 4px; text-align: center; border-bottom: 1px solid var(--border); }
        .group-standings td:first-child { text-align: left; padding-left: 10px; font-weight: 600; }
        .group-standings .person-name { font-size: .7em; color: var(--text2); font-weight: 400; display: block; }
        .group-standings .pts { font-weight: 700; color: var(--accent); font-size: 1.1em; }
        .group-standings tr:hover td { background: var(--highlight); }
        .group-standings .live-dot {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            background: #ff4444; margin-right: 4px; animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .group-games { margin-top: 6px; padding: 6px 10px 10px; border-top: 1px solid var(--border); }
        .group-games .game-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 4px; cursor: pointer; border-radius: 4px; font-size: .75em;
            gap: 6px; transition: background .1s;
        }
        .game-row:hover { background: var(--highlight); }
        .game-row.played { opacity: .7; }
        .game-row.live { background: #2a1a1a; border-left: 3px solid #ff4444; }
        .game-row .teams { flex: 1; min-width: 0; }
        .game-row .score { font-weight: 700; font-size: 1.1em; min-width: 36px; text-align: center; letter-spacing: 1px; color: var(--accent); }
        .game-row .score.pending { color: var(--text2); font-weight: 400; font-size: .7em; }
        .game-row .score.live-score { color: #ff6b6b; animation: pulse 1s infinite; }
        .game-row .date-sm { font-size: .65em; color: var(--text2); min-width: 40px; text-align: right; }
        .game-row .stadium-sm { font-size: .6em; color: var(--text2); display: block; }
        .ko-round { margin-bottom: 16px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        .ko-round h3 { background: var(--surface2); padding: 10px 14px; font-size: .9em; letter-spacing: 1px; color: var(--accent); border-bottom: 1px solid var(--border); }
        .ko-games { padding: 8px 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 6px; }
        .ko-game {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; cursor: pointer; border-radius: 6px; background: var(--surface2);
            border: 1px solid transparent; transition: all .15s; gap: 8px; font-size: .8em;
        }
        .ko-game:hover { border-color: var(--accent); background: var(--highlight); }
        .ko-game .ko-teams { flex: 1; min-width: 0; }
        .ko-game .ko-score { font-weight: 700; font-size: 1.1em; min-width: 40px; text-align: center; color: var(--accent); }
        .ko-game .ko-score.pending { color: var(--text2); font-weight: 400; font-size: .7em; }
        .ko-game .ko-date { font-size: .65em; color: var(--text2); text-align: right; min-width: 50px; }
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 200; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border: 2px solid var(--accent); border-radius: 16px;
            padding: 20px; max-width: 550px; width: 100%; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .modal h3 { text-align: center; color: var(--accent); margin-bottom: 4px; font-size: 1.2em; }
        .modal .modal-date { text-align: center; color: var(--text2); font-size: .75em; margin-bottom: 12px; }

        .modal .team-block { text-align: center; flex: 1; min-width: 120px; }

        .modal .team-block .country { font-weight: 700; font-size: 1.1em; display: block; }
        .modal .team-block .owner { font-size: .7em; color: var(--text2); }
        .modal .vs { font-weight: 700; color: var(--text2); font-size: 1.2em; }
        .modal .score-inputs { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 16px 0; }
        .modal .score-inputs input { width: 60px; height: 50px; text-align: center; font-size: 1.5em; font-weight: 700; border: 2px solid var(--border); border-radius: 10px; background: var(--surface2); color: var(--text); }
        .modal .score-inputs input:focus { border-color: var(--accent); outline: none; }
        .modal .score-inputs .dash { font-size: 1.5em; color: var(--text2); }
        .modal .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: .9em; transition: all .15s; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-close { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-reset { background: var(--loss); color: #fff; font-size: .75em; padding: 6px 12px; }

        .status-played { background: #238636; color: #fff; }
        @media (max-width:768px) {

            .ko-games { grid-template-columns: 1fr; }
        }

            const allKoGames = [

                {id:'K6',round:'Round of 32',home:'Winner F',away:'Runner-up E',dateStr:'2026-06-29',stadium:"Levi's Stadium, Santa Clara",localTime:'4:00 PM PT',pstTime:'4:00 PM PST'},

                {id:'K8',round:'Round of 32',home:'Winner H',away:'Runner-up G',dateStr:'2026-06-30',stadium:'Gillette Stadium, Foxborough',localTime:'1:00 PM ET',pstTime:'10:00 AM PST'},
                {id:'K9',round:'Round of 32',home:'Winner I',away:'Runner-up J',dateStr:'2026-06-30',stadium:'Estadio Azteca, Mexico City',localTime:'4:00 PM CT',pstTime:'2:00 PM PST'},
                {id:'K10',round:'Round of 32',home:'Winner J',away:'Runner-up I',dateStr:'2026-07-01',stadium:'Mercedes-Benz Stadium, Atlanta',localTime:'10:00 AM ET',pstTime:'7:00 AM PST'},
                {id:'K11',round:'Round of 32',home:'Winner K',away:'Runner-up L',dateStr:'2026-07-01',stadium:'Lincoln Financial Field, Philadelphia',localTime:'1:00 PM ET',pstTime:'10:00 AM PST'},
                {id:'K12',round:'Round of 32',home:'Winner L',away:'Runner-up K',dateStr:'2026-07-01',stadium:'Hard Rock Stadium, Miami',localTime:'4:00 PM ET',pstTime:'1:00 PM PST'},
                {id:'K13',round:'Round of 32',home:'Runner-up A',away:'Runner-up B',dateStr:'2026-07-02',stadium:'BC Place, Vancouver',localTime:'10:00 AM PT',pstTime:'10:00 AM PST'},
                {id:'K14',round:'Round of 32',home:'3rd Place Best*',away:'3rd Place Best*',dateStr:'2026-07-02',stadium:'Estadio Akron, Guadalajara',localTime:'1:00 PM CT',pstTime:'11:00 AM PST'},
                {id:'K15',round:'Round of 32',home:'3rd Place Best*',away:'3rd Place Best*',dateStr:'2026-07-02',stadium:'Lumen Field, Seattle',localTime:'4:00 PM PT',pstTime:'4:00 PM PST'},
                {id:'K16',round:'Round of 32',home:'3rd Place Best*',away:'3rd Place Best*',dateStr:'2026-07-02',stadium:'NRG Stadium, Houston',localTime:'7:00 PM CT',pstTime:'5:00 PM PST'},
                {id:'K17',round:'Round of 16',home:'Winner R32-1',away:'Winner R32-2',dateStr:'2026-07-04',stadium:'AT&T Stadium, Arlington',localTime:'1:00 PM CT',pstTime:'11:00 AM PST'},
                {id:'K18',round:'Round of 16',home:'Winner R32-3',away:'Winner R32-4',dateStr:'2026-07-04',stadium:'MetLife Stadium, East Rutherford',localTime:'4:00 PM ET',pstTime:'1:00 PM PST'},
                {id:'K19',round:'Round of 16',home:'Winner R32-5',away:'Winner R32-6',dateStr:'2026-07-05',stadium:'SoFi Stadium, Inglewood',localTime:'10:00 AM PT',pstTime:'10:00 AM PST'},
                {id:'K20',round:'Round of 16',home:'Winner R32-7',away:'Winner R32-8',dateStr:'2026-07-05',stadium:'BMO Field, Toronto',localTime:'1:00 PM ET',pstTime:'10:00 AM PST'},
                {id:'K21',round:'Round of 16',home:'Winner R32-9',away:'Winner R32-10',dateStr:'2026-07-05',stadium:"Levi's Stadium, Santa Clara",localTime:'4:00 PM PT',pstTime:'4:00 PM PST'},
                {id:'K22',round:'Round of 16',home:'Winner R32-11',away:'Winner R32-12',dateStr:'2026-07-06',stadium:'Arrowhead Stadium, Kansas City',localTime:'1:00 PM CT',pstTime:'11:00 AM PST'},
                {id:'K23',round:'Round of 16',home:'Winner R32-13',away:'Winner R32-14',dateStr:'2026-07-06',stadium:'Gillette Stadium, Foxborough',localTime:'4:00 PM ET',pstTime:'1:00 PM PST'},
                {id:'K24',round:'Round of 16',home:'Winner R32-15',away:'Winner R32-16',dateStr:'2026-07-06',stadium:'Estadio Azteca, Mexico City',localTime:'7:00 PM CT',pstTime:'5:00 PM PST'},
                {id:'K25',round:'Quarter-finals',home:'Winner R16-1',away:'Winner R16-2',dateStr:'2026-07-08',stadium:'MetLife Stadium, East Rutherford',localTime:'1:00 PM ET',pstTime:'10:00 AM PST'},
                {id:'K26',round:'Quarter-finals',home:'Winner R16-3',away:'Winner R16-4',dateStr:'2026-07-08',stadium:'AT&T Stadium, Arlington',localTime:'4:00 PM CT',pstTime:'2:00 PM PST'},
                {id:'K27',round:'Quarter-finals',home:'Winner R16-5',away:'Winner R16-6',dateStr:'2026-07-09',stadium:'SoFi Stadium, Inglewood',localTime:'1:00 PM PT',pstTime:'1:00 PM PST'},
                {id:'K28',round:'Quarter-finals',home:'Winner R16-7',away:'Winner R16-8',dateStr:'2026-07-10',stadium:'Arrowhead Stadium, Kansas City',localTime:'1:00 PM CT',pstTime:'11:00 AM PST'},
                {id:'K29',round:'Semi-finals',home:'Winner QF-1',away:'Winner QF-2',dateStr:'2026-07-14',stadium:'AT&T Stadium, Arlington',localTime:'1:00 PM CT',pstTime:'11:00 AM PST'},
                {id:'K30',round:'Semi-finals',home:'Winner QF-3',away:'Winner QF-4',dateStr:'2026-07-15',stadium:'Mercedes-Benz Stadium, Atlanta',localTime:'1:00 PM ET',pstTime:'10:00 AM PST'},
                {id:'K31',round:'Third Place',home:'Loser SF-1',away:'Loser SF-2',dateStr:'2026-07-18',stadium:'Hard Rock Stadium, Miami',localTime:'1:00 PM ET',pstTime:'10:00 AM PST'},
                {id:'K32',round:'Final',home:'Winner SF-1',away:'Winner SF-2',dateStr:'2026-07-19',stadium:'MetLife Stadium, East Rutherford',localTime:'1:00 PM ET',pstTime:'10:00 AM PST'}
            ];

            const allGames = [...allGroupGames, ...allKoGames];

            // ───── ADD MISSING FIELDS ─────
            allGroupGames.forEach(g => { g.homeScore=null; g.awayScore=null; g.round='group'; g.isKo=false; });
            allKoGames.forEach(g => { g.homeScore=null; g.awayScore=null; g.isKo=true; });

            // ───── LOCAL STORAGE ─────
            function loadScores() {
                const saved = localStorage.getItem('wc2026_scores_v2');
                if (saved) {
                    const data = JSON.parse(saved);
                    allGames.forEach(g => {
                        if (data[g.id]) {
                            g.homeScore = data[g.id].homeScore;
                            g.awayScore = data[g.id].awayScore;
                            if (data[g.id].homeTeam) g.home = data[g.id].homeTeam;
                            if (data[g.id].awayTeam) g.away = data[g.id].awayTeam;
                        }
                    });
                }
            }
            function saveScores() {
                const data = {};
                allGames.forEach(g => { data[g.id] = { homeScore:g.homeScore, awayScore:g.awayScore, homeTeam:g.home||g.homeTeam, awayTeam:g.away||g.awayTeam }; });
                localStorage.setItem('wc2026_scores_v2', JSON.stringify(data));
            }
            loadScores();

            let selectedDate = null;
            let currentView = 'groups';
            const todayStr = '2026-06-13';

            function getGameDates() {
                const s = new Set();
                allGames.forEach(g => s.add(g.dateStr));
                return s;
            }

            function renderCalendar() {
                const strip = document.getElementById('calendarStrip');
                const gameDates = getGameDates();
                const start = new Date(2026, 5, 11);
                const end = new Date(2026, 6, 19);
                const months = ['Jun', 'Jul'];
                let html = '';
                const cur = new Date(start);
                while (cur <= end) {
                    const ds = cur.toISOString().split('T')[0];
                    const has = gameDates.has(ds);
                    const sel = selectedDate === ds;
                    const isToday = ds === todayStr;
                    html += `<div class="cal-day${has?' has-games':''}${sel?' selected':''}${isToday?' today':''}" data-date="${ds}">
                        <span class="day-mon">${months[cur.getMonth()-5]}</span>
                        <span class="day-num">${cur.getDate()}</span>
                    </div>`;
                    cur.setDate(cur.getDate()+1);
                }
                strip.innerHTML = html;
                strip.querySelectorAll('.cal-day').forEach(el => {
                    el.addEventListener('click', () => {
                        selectedDate = selectedDate===el.dataset.date ? null : el.dataset.date;
                        renderCalendar(); renderAll();
                    });
                });
            }

            function getFilteredGames() {
                return selectedDate ? allGames.filter(g => g.dateStr===selectedDate) : allGames;
            }

            function getGameStatus(game) {
                if (game.homeScore!==null && game.awayScore!==null) return 'played';
                if (game.dateStr < todayStr) return 'played';
                if (game.dateStr === todayStr) return 'live';
                return 'upcoming';
            }

            function calculateStandings(groupId) {
                const grpGames = allGroupGames.filter(g => g.group===groupId);
                const teamsInGroup = grpGames.reduce((arr, g) => {
                    if (!arr.includes(g.home||g.homeTeam)) arr.push(g.home||g.homeTeam);
                    if (!arr.includes(g.away||g.awayTeam)) arr.push(g.away||g.awayTeam);
                    return arr;
                }, []);
                const stats = {};
                teamsInGroup.forEach(t => { stats[t] = { team:t, person:peopleMap[t]||'', gp:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 }; });
                grpGames.forEach(g => {
                    if (g.homeScore!==null && g.awayScore!==null) {
                        const h = g.home||g.homeTeam, a = g.away||g.awayTeam;
                        if (stats[h] && stats[a]) {
                            stats[h].gp++; stats[a].gp++;
                            stats[h].gf += g.homeScore; stats[h].ga += g.awayScore;
                            stats[a].gf += g.awayScore; stats[a].ga += g.homeScore;
                            if (g.homeScore > g.awayScore) { stats[h].w++; stats[h].pts+=3; stats[a].l++; }
                            else if (g.homeScore < g.awayScore) { stats[a].w++; stats[a].pts+=3; stats[h].l++; }
                            else { stats[h].d++; stats[a].d++; stats[h].pts+=1; stats[a].pts+=1; }
                        }
                    }
                });
                Object.values(stats).forEach(s => { s.gd = s.gf - s.ga; });
                return Object.values(stats).sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
            }

            function renderGroups() {
                const grid = document.getElementById('groupsGrid');
                const filtered = getFilteredGames().filter(g => g.round==='group');
                const fIds = new Set(filtered.map(g => g.id));
                const groupIds = [...new Set(allGroupGames.map(g => g.group))].sort();
                let html = '';
                groupIds.forEach(groupId => {
                    const standings = calculateStandings(groupId);
                    const grpGames = allGroupGames.filter(g => g.group===groupId);
                    html += `<div class="group-card"><h3>🏴 Group ${groupId}</h3>
                    <table class="group-standings"><thead><tr><th>Team</th><th>GP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
                    standings.forEach(s => {
                        html += `<tr><td>${s.team}<span class="person-name">${s.person}</span></td>
                        <td>${s.gp}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
                        <td>${s.gf}</td><td>${s.ga}</td><td>${s.gd>=0?'+':''}${s.gd}</td>
                        <td class="pts">${s.pts}</td></tr>`;
                    });
                    html += `</tbody></table><div class="group-games">`;
                    grpGames.forEach(game => {
                        const hi = fIds.has(game.id);
                        const status = getGameStatus(game);
                        const scored = game.homeScore!==null && game.awayScore!==null;
                        const homeTeam = game.home||game.homeTeam;
                        const awayTeam = game.away||game.awayTeam;
                        let rowClass = '';
                        if (status==='played') rowClass=' played';
                        if (status==='live') rowClass=' live';
                        let scoreClass = 'score';
                        if (!scored) { scoreClass = 'score pending'; }
                        if (status==='live' && scored) { scoreClass = 'score live-score'; }
                        let badge = '';
                        if (status==='live') badge = '<span class="status-badge status-live">LIVE</span>';
                        else if (status==='played' && scored) badge = '<span class="status-badge status-played">FT</span>';
                        else if (status==='upcoming') badge = '<span class="status-badge status-upcoming">UP</span>';
                        html += `<div class="game-row${rowClass}" data-game-id="${game.id}" style="${hi?'background:#2a2210;':''}">
                            <span class="teams"><strong>${homeTeam}</strong><span style="font-size:.65em;color:var(--text2);display:block">${peopleMap[homeTeam]||''}</span> — <strong>${awayTeam}</strong><span style="font-size:.65em;color:var(--text2);display:block">${peopleMap[awayTeam]||''}</span><span class="stadium-sm">${game.stadium} · ${game.localTime} (${game.pstTime})</span></span>
                            <span class="${scoreClass}">${scored?game.homeScore+' - '+game.awayScore:'vs'} ${badge}</span>
                            <span class="date-sm">${game.dateStr.slice(5)}</span></div>`;
                    });
                    html += `</div></div>`;
                });
                grid.innerHTML = html;
                grid.querySelectorAll('.game-row').forEach(r => r.addEventListener('click', ()=>openGameModal(r.dataset.gameId)));
            }

            function renderKnockout() {
                const container = document.getElementById('knockoutContainer');
                const filtered = getFilteredGames().filter(g=>g.isKo);
                const fIds = new Set(filtered.map(g=>g.id));
                const rounds = ['Round of 32','Round of 16','Quarter-finals','Semi-finals','Third Place','Final'];
                let html = '';
                rounds.forEach(rn => {
                    const games = allKoGames.filter(g=>g.round===rn);
                    if (!games.length) return;
                    html += `<div class="ko-round"><h3>🏆 ${rn}</h3><div class="ko-games">`;
                    games.forEach(game => {
                        const hi = fIds.has(game.id);
                        const sc = game.homeScore!==null && game.awayScore!==null;
                        const homeTeam = game.home||game.homeTeam;
                        const awayTeam = game.away||game.awayTeam;
                        html += `<div class="ko-game" data-game-id="${game.id}" style="${hi?'border:2px solid var(--accent);background:#2a2210;':''}">
                            <span class="ko-teams"><strong>${homeTeam}</strong> vs <strong>${awayTeam}</strong><span style="font-size:.6em;color:var(--text2);display:block">${game.stadium} · ${game.localTime} (${game.pstTime})</span></span>
                            <span class="${sc?'ko-score':'ko-score pending'}">${sc?game.homeScore+' - '+game.awayScore:'TBD'}</span>
                            <span class="ko-date">${game.dateStr.slice(5)}</span></div>`;
                    });
                    html += `</div></div>`;
                });
                container.innerHTML = html;
                container.querySelectorAll('.ko-game').forEach(r => r.addEventListener('click', ()=>openGameModal(r.dataset.gameId)));
            }

            function openGameModal(gameId) {
                const game = allGames.find(g => g.id===gameId);
                if (!game) return;
                const modal = document.getElementById('gameModal');
                const overlay = document.getElementById('modalOverlay');
                const homeTeam = game.home||game.homeTeam;
                const awayTeam = game.away||game.awayTeam;
                const hs = game.homeScore!==null ? game.homeScore : '';
                const as = game.awayScore!==null ? game.awayScore : '';
                const status = getGameStatus(game);
                modal.innerHTML = `
                    <h3>${game.round==='group'?'Group '+game.group+' · ':''}${homeTeam} vs ${awayTeam}</h3>
                    <div class="modal-date">📅 ${game.dateStr} &nbsp;|&nbsp; 🏟 ${game.stadium} &nbsp;|&nbsp; 🕐 ${game.localTime} (${game.pstTime}) ${status==='live'?'🔴 LIVE NOW':''}</div>
                    <div class="matchup">
                        <div class="team-block"><div class="flag">⚽</div><div class="country">${homeTeam}</div><div class="owner">${peopleMap[homeTeam]||''}</div></div>
                        <div class="vs">VS</div>
                        <div class="team-block"><div class="flag">⚽</div><div class="country">${awayTeam}</div><div class="owner">${peopleMap[awayTeam]||''}</div></div>
                    </div>
                    <div class="score-inputs">
                        <input type="number" id="modalHomeScore" value="${hs}" placeholder="-" min="0" max="99">
                        <span class="dash">—</span>
                        <input type="number" id="modalAwayScore" value="${as}" placeholder="-" min="0" max="99">
                    </div>
                    ${game.isKo?'<div style="text-align:center;font-size:.7em;color:var(--text2);margin-bottom:8px;">Knockout · enter scores (incl. extra time)</div>':''}
                    <div class="btn-row">
                        <button class="btn btn-save" id="modalSave">💾 Save Score</button>
                        <button class="btn btn-reset" id="modalReset">🗑 Clear</button>
                        <button class="btn btn-close" id="modalClose">✕ Close</button>
                    </div>
                    <div class="edit-section">
                        <label>Edit Team Names (click to edit):</label>
                        <input id="modalEditHome" value="${homeTeam}" placeholder="Home Team">
                        <input id="modalEditAway" value="${awayTeam}" placeholder="Away Team">
                        <button class="btn btn-save" id="modalUpdateTeams" style="width:100%;font-size:.75em;">Update Team Names</button>
                    </div>`;
                overlay.classList.add('open');

                document.getElementById('modalSave').addEventListener('click', () => {
                    const h = document.getElementById('modalHomeScore').value;
                    const a = document.getElementById('modalAwayScore').value;
                    if (h!=='' && a!=='' && !isNaN(h) && !isNaN(a)) { game.homeScore=parseInt(h); game.awayScore=parseInt(a); }
                    else if (h==='' && a==='') { game.homeScore=null; game.awayScore=null; }
                    saveScores(); overlay.classList.remove('open'); renderAll();
                });
                document.getElementById('modalReset').addEventListener('click', () => {
                    game.homeScore=null; game.awayScore=null; saveScores(); overlay.classList.remove('open'); renderAll();
                });
                document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('open'));
                document.getElementById('modalUpdateTeams').addEventListener('click', () => {
                    const nh = document.getElementById('modalEditHome').value.trim();
                    const na = document.getElementById('modalEditAway').value.trim();
                    if (nh) { if (game.home!==undefined) game.home=nh; else game.homeTeam=nh; }
                    if (na) { if (game.away!==undefined) game.away=na; else game.awayTeam=na; }
                    saveScores(); overlay.classList.remove('open'); renderAll();
                });
            }
            document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target===this) this.classList.remove('open'); });

            function renderFilterBanner() {
                const b = document.getElementById('filterBanner');
                if (selectedDate) {
                    const cnt = getFilteredGames().length;
                    b.innerHTML = `🔍 ${cnt} game(s) on <strong>${selectedDate}</strong> <span class="clear-filter" id="clearFilter">[Show All]</span>`;
                    document.getElementById('clearFilter').addEventListener('click', ()=>{ selectedDate=null; renderCalendar(); renderAll(); });
                } else {
                    b.innerHTML = `<span style="color:var(--text2);">📅 ${allGames.length} total matches · Click a date to filter · 🟡 Today: June 13, 2026</span>`;
                }
            }

            function renderAll() {
                renderFilterBanner();
                if (currentView==='groups') renderGroups(); else renderKnockout();
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    currentView = btn.dataset.view;
                    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
                    document.getElementById('view-'+currentView).classList.add('active');
                    renderAll();
                });
            });
            document.addEventListener('keydown', e => { if (e.key==='Escape') document.getElementById('modalOverlay').classList.remove('open'); });

            renderCalendar();
            renderAll();
            console.log('⚽ 2026 World Cup Tracker · 72 Group Stage + 32 Knockout Matches · Updated June 13, 2026');
        })();
    </script>
</body>
