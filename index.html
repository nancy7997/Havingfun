<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text2: #8b949e;
            --accent: #f0c040;
            --accent2: #e04040;
            --green: #3fb950;
            --blue: #58a6ff;
            --gold: #d2991d;
            --win: #238636;
            --loss: #da3633;
            --draw: #8b949e;
            --highlight: #1f2a37;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            line-height: 1.4;
        }
        header {
            background: var(--surface);
            border-bottom: 2px solid var(--accent);
            padding: 12px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        header h1 { font-size:1.6em; letter-spacing:1px; color:var(--accent); }
        header .subtitle { font-size:.75em; color:var(--text2); margin-top:2px; }

        .calendar-wrap {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            position: sticky;
            top: 72px;
            z-index: 99;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .calendar-strip { display:flex; gap:4px; padding:0 12px; min-width:fit-content; }
        .cal-day {
            flex:0 0 44px; height:52px; border-radius:8px;
            background: var(--surface2); border:1px solid var(--border);
            cursor:pointer; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            font-size:.7em; transition:all .15s; user-select:none; position:relative;
        }
        .cal-day:hover { border-color:var(--accent); background:var(--highlight); }
        .cal-day.has-games { border-color:var(--accent); background:#2a2210; }
        .cal-day.has-games::after {
            content:''; position:absolute; bottom:4px; width:5px; height:5px;
            border-radius:50%; background:var(--accent);
        }
        .cal-day.selected { background:var(--accent); color:#000; font-weight:bold; border-color:var(--accent); }
        .cal-day.selected::after { background:#000; }
        .cal-day .day-num { font-size:1.2em; font-weight:700; line-height:1; }
        .cal-day .day-mon { font-size:.65em; text-transform:uppercase; opacity:.8; }

        .tabs {
            display:flex; gap:0; padding:0 16px; margin:10px 0; flex-wrap:wrap;
        }
        .tab-btn {
            padding:10px 20px; border:1px solid var(--border); background:var(--surface2);
            color:var(--text); cursor:pointer; font-size:.9em; font-weight:600;
            transition:all .15s; border-radius:6px 6px 0 0; margin-right:-1px;
        }
        .tab-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
        .tab-btn:hover:not(.active) { background:var(--highlight); border-color:var(--accent); }

        .content { padding:8px 12px 40px; max-width:1400px; margin:0 auto; }
        .view { display:none; }
        .view.active { display:block; }

        .groups-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap:12px; }
        .group-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:10px; overflow:hidden;
        }
        .group-card h3 {
            background:var(--surface2); padding:10px 14px; font-size:.95em;
            letter-spacing:1px; border-bottom:1px solid var(--border); color:var(--accent);
        }
        .group-standings { width:100%; border-collapse:collapse; font-size:.78em; }
        .group-standings th {
            background:var(--surface2); padding:6px 4px; text-align:center;
            font-size:.75em; color:var(--text2); font-weight:600; border-bottom:1px solid var(--border);
        }
        .group-standings th:first-child { text-align:left; padding-left:10px; }
        .group-standings td {
            padding:6px 4px; text-align:center; border-bottom:1px solid var(--border);
        }
        .group-standings td:first-child { text-align:left; padding-left:10px; font-weight:600; }
        .group-standings .person-name { font-size:.7em; color:var(--text2); font-weight:400; display:block; }
        .group-standings .pts { font-weight:700; color:var(--accent); font-size:1.1em; }
        .group-standings tr:hover td { background:var(--highlight); }
        .group-games { margin-top:6px; padding:6px 10px 10px; border-top:1px solid var(--border); }
        .group-games .game-row {
            display:flex; align-items:center; justify-content:space-between;
            padding:6px 4px; cursor:pointer; border-radius:4px; font-size:.75em;
            gap:6px; transition:background .1s;
        }
        .group-games .game-row:hover { background:var(--highlight); }
        .game-row .teams { flex:1; min-width:0; }
        .game-row .score { font-weight:700; font-size:1.1em; min-width:36px; text-align:center; letter-spacing:1px; color:var(--accent); }
        .game-row .score.pending { color:var(--text2); font-weight:400; font-size:.7em; }
        .game-row .date-sm { font-size:.65em; color:var(--text2); min-width:40px; text-align:right; }
        .game-row .stadium-sm { font-size:.6em; color:var(--text2); display:block; }

        .ko-round { margin-bottom:16px; background:var(--surface); border-radius:10px; border:1px solid var(--border); overflow:hidden; }
        .ko-round h3 { background:var(--surface2); padding:10px 14px; font-size:.9em; letter-spacing:1px; color:var(--accent); border-bottom:1px solid var(--border); }
        .ko-games { padding:8px 12px; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap:6px; }
        .ko-game {
            display:flex; align-items:center; justify-content:space-between;
            padding:10px; cursor:pointer; border-radius:6px; background:var(--surface2);
            border:1px solid transparent; transition:all .15s; gap:8px; font-size:.8em;
        }
        .ko-game:hover { border-color:var(--accent); background:var(--highlight); }
        .ko-game .ko-teams { flex:1; min-width:0; }
        .ko-game .ko-score { font-weight:700; font-size:1.1em; min-width:40px; text-align:center; color:var(--accent); }
        .ko-game .ko-score.pending { color:var(--text2); font-weight:400; font-size:.7em; }
        .ko-game .ko-date { font-size:.65em; color:var(--text2); text-align:right; min-width:50px; }

        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
            z-index:200; justify-content:center; align-items:center; padding:20px;
        }
        .modal-overlay.open { display:flex; }
        .modal {
            background:var(--surface); border:2px solid var(--accent); border-radius:16px;
            padding:20px; max-width:500px; width:100%; max-height:85vh; overflow-y:auto;
            box-shadow:0 20px 60px rgba(0,0,0,0.7);
        }
        .modal h3 { text-align:center; color:var(--accent); margin-bottom:4px; font-size:1.2em; }
        .modal .modal-date { text-align:center; color:var(--text2); font-size:.75em; margin-bottom:12px; }
        .modal .matchup { display:flex; align-items:center; justify-content:center; gap:16px; margin:16px 0; flex-wrap:wrap; }
        .modal .team-block { text-align:center; flex:1; min-width:100px; }
        .modal .team-block .flag { font-size:2.5em; }
        .modal .team-block .country { font-weight:700; font-size:1.1em; }
        .modal .team-block .owner { font-size:.7em; color:var(--text2); }
        .modal .vs { font-weight:700; color:var(--text2); font-size:1.2em; }
        .modal .score-inputs { display:flex; align-items:center; justify-content:center; gap:20px; margin:16px 0; }
        .modal .score-inputs input { width:60px; height:50px; text-align:center; font-size:1.5em; font-weight:700; border:2px solid var(--border); border-radius:10px; background:var(--surface2); color:var(--text); }
        .modal .score-inputs input:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 3px rgba(240,192,64,0.2); }
        .modal .score-inputs .dash { font-size:1.5em; color:var(--text2); }
        .modal .btn-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
        .btn { padding:10px 20px; border-radius:8px; border:none; cursor:pointer; font-weight:600; font-size:.9em; transition:all .15s; }
        .btn-save { background:var(--accent); color:#000; }
        .btn-save:hover { background:#f5d060; }
        .btn-close { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
        .btn-close:hover { border-color:var(--text2); }
        .btn-reset { background:var(--loss); color:#fff; font-size:.75em; padding:6px 12px; }

        @media (max-width:768px) {
            .groups-grid { grid-template-columns:1fr; }
            .ko-games { grid-template-columns:1fr; }
            header h1 { font-size:1.2em; }
            .modal .matchup { gap:8px; }
            .modal .team-block .flag { font-size:1.8em; }
            .modal .score-inputs input { width:48px; height:40px; font-size:1.2em; }
        }
        .filter-info { text-align:center; padding:8px; color:var(--accent); font-size:.85em; font-weight:600; }
        .clear-filter { cursor:pointer; text-decoration:underline; font-size:.8em; color:var(--blue); margin-left:8px; }
    </style>
</head>

                const group = groups.find(g => g.id === slot.g);
                const pairings = [
                    [group.teams[0], group.teams[1]],
                    [group.teams[2], group.teams[3]],
                    [group.teams[0], group.teams[2]],
                    [group.teams[1], group.teams[3]],
                    [group.teams[0], group.teams[3]],
                    [group.teams[1], group.teams[2]]
                ];
                const [home, away] = pairings[slot.m-1];
                const localTime = slot.time;
                const pstTime = computePST(localTime, slot.offset);
                allGroupGames.push({
                    id: 'G' + (gid++),
                    group: slot.g,
                    homeTeam: home,
                    awayTeam: away,
                    dateStr: slot.date,
                    stadium: slot.stadium + ', ' + slot.city,
                    localTime: localTime + ' ' + (slot.offset===-4?'ET':slot.offset===-5?'CT':slot.offset===-6?'CT':slot.offset===-7?'PT':''),
                    pstTime: pstTime,
                    homeScore: null,
                    awayScore: null,
                    round: 'group'
                });
            });

            // ---- OFFICIAL KNOCKOUT SCHEDULE (32 matches) ----
            const koData = [
                // Round of 32 (June 28 - July 2)
                {r:'Round of 32', d:'2026-06-28', s:'MetLife Stadium', c:'East Rutherford', o:-4, t:'13:00', h:'Winner A', a:'3rd Place Best*'},
                {r:'Round of 32', d:'2026-06-28', s:'AT&T Stadium', c:'Arlington', o:-5, t:'16:00', h:'Winner B', a:'3rd Place Best*'},
                {r:'Round of 32', d:'2026-06-28', s:'SoFi Stadium', c:'Inglewood', o:-7, t:'19:00', h:'Winner C', a:'Runner-up D'},
                {r:'Round of 32', d:'2026-06-29', s:'NRG Stadium', c:'Houston', o:-5, t:'10:00', h:'Winner D', a:'Runner-up C'},
                {r:'Round of 32', d:'2026-06-29', s:'BMO Field', c:'Toronto', o:-4, t:'13:00', h:'Winner E', a:'Runner-up F'},
                {r:'Round of 32', d:'2026-06-29', s:'Levi\'s Stadium', c:'Santa Clara', o:-7, t:'16:00', h:'Winner F', a:'Runner-up E'},
                {r:'Round of 32', d:'2026-06-30', s:'Arrowhead Stadium', c:'Kansas City', o:-5, t:'10:00', h:'Winner G', a:'Runner-up H'},
                {r:'Round of 32', d:'2026-06-30', s:'Gillette Stadium', c:'Foxborough', o:-4, t:'13:00', h:'Winner H', a:'Runner-up G'},
                {r:'Round of 32', d:'2026-06-30', s:'Estadio Azteca', c:'Mexico City', o:-6, t:'16:00', h:'Winner I', a:'Runner-up J'},
                {r:'Round of 32', d:'2026-07-01', s:'Mercedes-Benz Stadium', c:'Atlanta', o:-4, t:'10:00', h:'Winner J', a:'Runner-up I'},
                {r:'Round of 32', d:'2026-07-01', s:'Lincoln Financial Field', c:'Philadelphia', o:-4, t:'13:00', h:'Winner K', a:'Runner-up L'},
                {r:'Round of 32', d:'2026-07-01', s:'Hard Rock Stadium', c:'Miami', o:-4, t:'16:00', h:'Winner L', a:'Runner-up K'},
                {r:'Round of 32', d:'2026-07-02', s:'BC Place', c:'Vancouver', o:-7, t:'10:00', h:'Runner-up A', a:'Runner-up B'},
                {r:'Round of 32', d:'2026-07-02', s:'Estadio Akron', c:'Guadalajara', o:-6, t:'13:00', h:'3rd Place Best*', a:'3rd Place Best*'},
                {r:'Round of 32', d:'2026-07-02', s:'Lumen Field', c:'Seattle', o:-7, t:'16:00', h:'3rd Place Best*', a:'3rd Place Best*'},
                {r:'Round of 32', d:'2026-07-02', s:'NRG Stadium', c:'Houston', o:-5, t:'19:00', h:'3rd Place Best*', a:'3rd Place Best*'},
                // Round of 16 (July 4-6)
                {r:'Round of 16', d:'2026-07-04', s:'AT&T Stadium', c:'Arlington', o:-5, t:'13:00', h:'Winner R32-1', a:'Winner R32-2'},
                {r:'Round of 16', d:'2026-07-04', s:'MetLife Stadium', c:'East Rutherford', o:-4, t:'16:00', h:'Winner R32-3', a:'Winner R32-4'},
                {r:'Round of 16', d:'2026-07-05', s:'SoFi Stadium', c:'Inglewood', o:-7, t:'10:00', h:'Winner R32-5', a:'Winner R32-6'},
                {r:'Round of 16', d:'2026-07-05', s:'BMO Field', c:'Toronto', o:-4, t:'13:00', h:'Winner R32-7', a:'Winner R32-8'},
                {r:'Round of 16', d:'2026-07-05', s:'Levi\'s Stadium', c:'Santa Clara', o:-7, t:'16:00', h:'Winner R32-9', a:'Winner R32-10'},
                {r:'Round of 16', d:'2026-07-06', s:'Arrowhead Stadium', c:'Kansas City', o:-5, t:'13:00', h:'Winner R32-11', a:'Winner R32-12'},
                {r:'Round of 16', d:'2026-07-06', s:'Gillette Stadium', c:'Foxborough', o:-4, t:'16:00', h:'Winner R32-13', a:'Winner R32-14'},
                {r:'Round of 16', d:'2026-07-06', s:'Estadio Azteca', c:'Mexico City', o:-6, t:'19:00', h:'Winner R32-15', a:'Winner R32-16'},
                // Quarter-finals (July 8-10)
                {r:'Quarter-finals', d:'2026-07-08', s:'MetLife Stadium', c:'East Rutherford', o:-4, t:'13:00', h:'Winner R16-1', a:'Winner R16-2'},
                {r:'Quarter-finals', d:'2026-07-08', s:'AT&T Stadium', c:'Arlington', o:-5, t:'16:00', h:'Winner R16-3', a:'Winner R16-4'},
                {r:'Quarter-finals', d:'2026-07-09', s:'SoFi Stadium', c:'Inglewood', o:-7, t:'13:00', h:'Winner R16-5', a:'Winner R16-6'},
                {r:'Quarter-finals', d:'2026-07-10', s:'Arrowhead Stadium', c:'Kansas City', o:-5, t:'13:00', h:'Winner R16-7', a:'Winner R16-8'},
                // Semi-finals (July 14-15)
                {r:'Semi-finals', d:'2026-07-14', s:'AT&T Stadium', c:'Arlington', o:-5, t:'13:00', h:'Winner QF-1', a:'Winner QF-2'},
                {r:'Semi-finals', d:'2026-07-15', s:'Mercedes-Benz Stadium', c:'Atlanta', o:-4, t:'13:00', h:'Winner QF-3', a:'Winner QF-4'},
                // Third Place (July 18)
                {r:'Third Place', d:'2026-07-18', s:'Hard Rock Stadium', c:'Miami', o:-4, t:'13:00', h:'Loser SF-1', a:'Loser SF-2'},
                // Final (July 19)
                {r:'Final', d:'2026-07-19', s:'MetLife Stadium', c:'East Rutherford', o:-4, t:'13:00', h:'Winner SF-1', a:'Winner SF-2'}
            ];

            const allKoGames = [];
            let kid = 1;
            koData.forEach(k => {
                const pst = computePST(k.t, k.o);
                allKoGames.push({
                    id: 'K' + (kid++),
                    round: k.r,
                    homeTeam: k.h,
                    awayTeam: k.a,
                    dateStr: k.d,
                    stadium: k.s + ', ' + k.c,
                    localTime: k.t + ' ' + (k.o===-4?'ET':k.o===-5?'CT':k.o===-6?'CT':k.o===-7?'PT':''),
                    pstTime: pst,
                    homeScore: null,
                    awayScore: null,
                    isKo: true
                });
            });

            const allGames = [...allGroupGames, ...allKoGames];

            // ---- LOCAL STORAGE ----
            function loadScores() {
                const saved = localStorage.getItem('wc2026_scores');
                if (saved) {
                    const data = JSON.parse(saved);
                    allGames.forEach(game => {
                        if (data[game.id]) {
                            game.homeScore = data[game.id].homeScore;
                            game.awayScore = data[game.id].awayScore;
                            if (data[game.id].homeTeam) game.homeTeam = data[game.id].homeTeam;
                            if (data[game.id].awayTeam) game.awayTeam = data[game.id].awayTeam;
                        }
                    });
                }
            }
            function saveScores() {
                const data = {};
                allGames.forEach(game => {
                    data[game.id] = { homeScore:game.homeScore, awayScore:game.awayScore, homeTeam:game.homeTeam, awayTeam:game.awayTeam };
                });
                localStorage.setItem('wc2026_scores', JSON.stringify(data));
            }
            loadScores();

            let selectedDate = null;
            let currentView = 'groups';

            function getGameDates() {
                const s = new Set();
                allGames.forEach(g => s.add(g.dateStr));
                return s;
            }

            function renderCalendar() {
                const strip = document.getElementById('calendarStrip');
                const gameDates = getGameDates();
                const start = new Date(2026,5,11);
                const end = new Date(2026,6,19);
                const months = ['Jun','Jul'];
                let html = '';
                const cur = new Date(start);
                while (cur <= end) {
                    const ds = cur.toISOString().split('T')[0];
                    const has = gameDates.has(ds);
                    const sel = selectedDate === ds;
                    html += `<div class='cal-day${has?' has-games':''}${sel?' selected':''}' data-date='${ds}'><span class='day-mon'>${months[cur.getMonth()-5]}</span><span class='day-num'>${cur.getDate()}</span></div>`;
                    cur.setDate(cur.getDate()+1);
                }
                strip.innerHTML = html;
                strip.querySelectorAll('.cal-day').forEach(el => {
                    el.addEventListener('click',()=>{
                        const d = el.dataset.date;
                        selectedDate = selectedDate===d ? null : d;
                        renderCalendar(); renderAll();
                    });
                });
            }

            function getFilteredGames() {
                return selectedDate ? allGames.filter(g=>g.dateStr===selectedDate) : allGames;
            }

            function calculateStandings(groupId) {
                const grpGames = allGroupGames.filter(g=>g.group===groupId);
                const teams = groups.find(g=>g.id===groupId).teams;
                const stats = {};
                teams.forEach(t => stats[t] = {team:t,person:peopleMap[t]||'',gp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
                grpGames.forEach(game=>{
                    if(game.homeScore!==null && game.awayScore!==null){
                        const h=game.homeTeam, a=game.awayTeam;
                        if(stats[h]&&stats[a]){
                            stats[h].gp++; stats[a].gp++;
                            stats[h].gf+=game.homeScore; stats[h].ga+=game.awayScore;
                            stats[a].gf+=game.awayScore; stats[a].ga+=game.homeScore;
                            if(game.homeScore>game.awayScore){ stats[h].w++; stats[h].pts+=3; stats[a].l++; }
                            else if(game.homeScore<game.awayScore){ stats[a].w++; stats[a].pts+=3; stats[h].l++; }
                            else { stats[h].d++; stats[a].d++; stats[h].pts+=1; stats[a].pts+=1; }
                        }
                    }
                });
                Object.values(stats).forEach(s=>{s.gd=s.gf-s.ga;});
                return Object.values(stats).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
            }

            function renderGroups() {
                const grid = document.getElementById('groupsGrid');
                const filtered = getFilteredGames().filter(g=>g.round==='group');
                const fIds = new Set(filtered.map(g=>g.id));
                let html = '';
                groups.forEach(group=>{
                    const standings = calculateStandings(group.id);
                    const grpGames = allGroupGames.filter(g=>g.group===group.id);
                    html += `<div class='group-card'><h3>🏴 Group ${group.id}</h3><table class='group-standings'><thead><tr><th>Team</th><th>GP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
                    standings.forEach(s=>{
                        html += `<tr><td>${s.team}<span class='person-name'>${s.person}</span></td><td>${s.gp}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${s.gf}</td><td>${s.ga}</td><td>${s.gd>=0?'+':''}${s.gd}</td><td class='pts'>${s.pts}</td></tr>`;
                    });
                    html += `</tbody></table><div class='group-games'>`;
                    grpGames.forEach(game=>{
                        const hi = fIds.has(game.id);
                        const scored = game.homeScore!==null && game.awayScore!==null;
                        html += `<div class='game-row' data-game-id='${game.id}' style='${hi?'background:#2a2210;border-left:3px solid var(--accent);padding-left:6px;':''}'>
                            <span class='teams'><strong>${game.homeTeam}</strong><span style='font-size:.65em;color:var(--text2);display:block'>${peopleMap[game.homeTeam]||''}</span> — <strong>${game.awayTeam}</strong><span style='font-size:.65em;color:var(--text2);display:block'>${peopleMap[game.awayTeam]||''}</span><span class='stadium-sm'>${game.stadium} · ${game.localTime} (${game.pstTime})</span></span>
                            <span class='${scored?'score':'score pending'}'>${scored?game.homeScore+' - '+game.awayScore:'vs'}</span>
                            <span class='date-sm'>${game.dateStr.slice(5)}</span></div>`;
                    });
                    html += `</div></div>`;
                });
                grid.innerHTML = html;
                grid.querySelectorAll('.game-row').forEach(r=> r.addEventListener('click',()=>openGameModal(r.dataset.gameId)));
            }

            function renderKnockout() {
                const container = document.getElementById('knockoutContainer');
                const filtered = getFilteredGames().filter(g=>g.isKo);
                const fIds = new Set(filtered.map(g=>g.id));
                const rounds = ['Round of 32','Round of 16','Quarter-finals','Semi-finals','Third Place','Final'];
                let html = '';
                rounds.forEach(rn=>{
                    const games = allKoGames.filter(g=>g.round===rn);
                    if(!games.length) return;
                    html += `<div class='ko-round'><h3>🏆 ${rn}</h3><div class='ko-games'>`;
                    games.forEach(game=>{
                        const hi = fIds.has(game.id);
                        const sc = game.homeScore!==null && game.awayScore!==null;
                        html += `<div class='ko-game' data-game-id='${game.id}' style='${hi?'border:2px solid var(--accent);background:#2a2210;':''}'>
                            <span class='ko-teams'><strong>${game.homeTeam}</strong> vs <strong>${game.awayTeam}</strong><span style='font-size:.6em;color:var(--text2);display:block'>${game.stadium} · ${game.localTime} (${game.pstTime})</span></span>
                            <span class='${sc?'ko-score':'ko-score pending'}'>${sc?game.homeScore+' - '+game.awayScore:'TBD'}</span>
                            <span class='ko-date'>${game.dateStr.slice(5)}</span></div>`;
                    });
                    html += `</div></div>`;
                });
                container.innerHTML = html;
                container.querySelectorAll('.ko-game').forEach(r=> r.addEventListener('click',()=>openGameModal(r.dataset.gameId)));
            }

            function openGameModal(gameId) {
                const game = allGames.find(g=>g.id===gameId);
                if(!game) return;
                const modal = document.getElementById('gameModal');
                const overlay = document.getElementById('modalOverlay');
                const hs = game.homeScore!==null?game.homeScore:'';
                const as = game.awayScore!==null?game.awayScore:'';
                modal.innerHTML = `
                <h3>${game.round==='group'?'Group '+game.group+' · ':''}${game.homeTeam} vs ${game.awayTeam}</h3>
                <div class='modal-date'>📅 ${game.dateStr} &nbsp;|&nbsp; 🏟 ${game.stadium} &nbsp;|&nbsp; 🕐 ${game.localTime} (${game.pstTime})</div>
                <div class='matchup'>
                    <div class='team-block'><div class='flag'>⚽</div><div class='country'>${game.homeTeam}</div><div class='owner'>${peopleMap[game.homeTeam]||''}</div></div>
                    <div class='vs'>VS</div>
                    <div class='team-block'><div class='flag'>⚽</div><div class='country'>${game.awayTeam}</div><div class='owner'>${peopleMap[game.awayTeam]||''}</div></div>
                </div>
                <div class='score-inputs'>
                    <input type='number' id='modalHomeScore' value='${hs}' placeholder='-' min='0' max='99'>
                    <span class='dash'>—</span>
                    <input type='number' id='modalAwayScore' value='${as}' placeholder='-' min='0' max='99'>
                </div>
                ${game.isKo?'<div style="text-align:center;font-size:.7em;color:var(--text2);margin-bottom:8px;">Knockout · enter scores (incl. extra time)</div>':''}
                <div class='btn-row'>
                    <button class='btn btn-save' id='modalSave'>💾 Save</button>
                    <button class='btn btn-reset' id='modalReset'>🗑 Clear</button>
                    <button class='btn btn-close' id='modalClose'>✕ Close</button>
                </div>
                ${game.isKo?`<div style="margin-top:10px;font-size:.7em;color:var(--text2);text-align:center;">Edit team names:</div>
                <div style="display:flex;gap:8px;margin-top:6px;">
                    <input id="modalEditHome" value="${game.homeTeam}" style="flex:1;padding:6px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:.75em;">
                    <input id="modalEditAway" value="${game.awayTeam}" style="flex:1;padding:6px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:.75em;">
                    <button class="btn btn-save" id="modalUpdateTeams" style="font-size:.7em;padding:6px 10px;">Update</button>
                </div>`:''}`;
                overlay.classList.add('open');

                document.getElementById('modalSave').addEventListener('click',()=>{
                    const h = document.getElementById('modalHomeScore').value;
                    const a = document.getElementById('modalAwayScore').value;
                    if(h!=='' && a!=='' && !isNaN(h) && !isNaN(a)){ game.homeScore=parseInt(h); game.awayScore=parseInt(a); }
                    else if(h==='' && a===''){ game.homeScore=null; game.awayScore=null; }
                    saveScores(); overlay.classList.remove('open'); renderAll();
                });
                document.getElementById('modalReset').addEventListener('click',()=>{
                    game.homeScore=null; game.awayScore=null; saveScores(); overlay.classList.remove('open'); renderAll();
                });
                document.getElementById('modalClose').addEventListener('click',()=> overlay.classList.remove('open'));
                if(game.isKo){
                    document.getElementById('modalUpdateTeams').addEventListener('click',()=>{
                        const nh = document.getElementById('modalEditHome').value.trim();
                        const na = document.getElementById('modalEditAway').value.trim();
                        if(nh) game.homeTeam=nh; if(na) game.awayTeam=na;
                        saveScores(); overlay.classList.remove('open'); renderAll();
                    });
                }
            }
            document.getElementById('modalOverlay').addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); });

            function renderFilterBanner() {
                const b = document.getElementById('filterBanner');
                if(selectedDate){
                    const cnt = getFilteredGames().length;
                    b.innerHTML = `🔍 Showing ${cnt} game(s) on <strong>${selectedDate}</strong> <span class='clear-filter' id='clearFilter'>[Show All]</span>`;
                    document.getElementById('clearFilter').addEventListener('click',()=>{ selectedDate=null; renderCalendar(); renderAll(); });
                } else b.innerHTML = `<span style="color:var(--text2);">📅 Select a date on the calendar · ${allGames.length} total matches</span>`;
            }

            function renderAll() {
                renderFilterBanner();
                if(currentView==='groups') renderGroups(); else renderKnockout();
            }

            document.querySelectorAll('.tab-btn').forEach(btn=>{
                btn.addEventListener('click',()=>{
                    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    currentView = btn.dataset.view;
                    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
                    document.getElementById('view-'+currentView).classList.add('active');
                    renderAll();
                });
            });
            document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('modalOverlay').classList.remove('open'); });

            renderCalendar();
            renderAll();
            console.log('⚽ 2026 World Cup Tracker · Official Schedule Ready');
        })();
    </script>
</body>
</html>
