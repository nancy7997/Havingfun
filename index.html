<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ 2026 World Cup Tracker</title>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
            --border: #30363d; --text: #e6edf3; --text2: #8b949e;
            --accent: #f0c040; --win: #238636; --loss: #da3633;
            --draw: #8b949e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; line-height:1.4; }
        header { background:var(--surface); border-bottom:2px solid var(--accent); padding:10px 16px; text-align:center; position:sticky; top:0; z-index:100; }
        header h1 { font-size:1.3em; color:var(--accent); }
        header .subtitle { font-size:.65em; color:var(--text2); }
        .calendar-wrap { background:var(--surface); border-bottom:1px solid var(--border); padding:6px 0; position:sticky; top:60px; z-index:99; overflow-x:auto; white-space:nowrap; }
        .calendar-strip { display:flex; gap:3px; padding:0 8px; min-width:fit-content; }
        .cal-day { flex:0 0 40px; height:44px; border-radius:6px; background:var(--surface2); border:1px solid var(--border); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:.6em; }
        .cal-day.has-games { border-color:var(--accent); background:#2a2210; }
        .cal-day.selected { background:var(--accent); color:#000; font-weight:bold; }
        .cal-day.today { border:2px solid #ff6b6b; }
        .cal-day .day-num { font-size:1em; font-weight:700; }
        .tabs { display:flex; padding:0 12px; margin:8px 0; }
        .tab-btn { padding:8px 16px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; font-size:.85em; font-weight:600; border-radius:6px 6px 0 0; margin-right:-1px; }
        .tab-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
        .content { padding:6px 10px 40px; max-width:1400px; margin:0 auto; }
        .view { display:none; }
        .view.active { display:block; }
        .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:10px; }
        .group-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
        .group-card h3 { background:var(--surface2); padding:8px 12px; font-size:.85em; color:var(--accent); border-bottom:1px solid var(--border); }
        .group-standings { width:100%; border-collapse:collapse; font-size:.7em; }
        .group-standings th { background:var(--surface2); padding:4px 2px; text-align:center; font-size:.65em; color:var(--text2); border-bottom:1px solid var(--border); }
        .group-standings th:first-child { text-align:left; padding-left:8px; }
        .group-standings td { padding:4px 2px; text-align:center; border-bottom:1px solid var(--border); }
        .group-standings td:first-child { text-align:left; padding-left:8px; font-weight:600; }
        .group-standings .person-name { font-size:.6em; color:var(--text2); font-weight:400; display:block; }
        .group-standings .pts { font-weight:700; color:var(--accent); }
        .group-games { padding:4px 8px 8px; border-top:1px solid var(--border); }
        .game-row { display:flex; align-items:center; justify-content:space-between; padding:4px 2px; cursor:pointer; border-radius:4px; font-size:.68em; gap:4px; }
        .game-row:hover { background:var(--surface2); }
        .game-row .teams { flex:1; min-width:0; }
        .game-row .score { font-weight:700; min-width:30px; text-align:center; color:var(--accent); }
        .game-row .score.pending { color:var(--text2); font-weight:400; font-size:.6em; }
        .game-row .date-sm { font-size:.55em; color:var(--text2); min-width:32px; text-align:right; }
        .ko-round { margin-bottom:14px; background:var(--surface); border-radius:8px; border:1px solid var(--border); overflow:hidden; }
        .ko-round h3 { background:var(--surface2); padding:8px 12px; font-size:.85em; color:var(--accent); border-bottom:1px solid var(--border); }
        .ko-games { padding:6px 10px; display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:4px; }
        .ko-game { display:flex; align-items:center; justify-content:space-between; padding:8px; cursor:pointer; border-radius:6px; background:var(--surface2); font-size:.72em; }
        .ko-game:hover { border:1px solid var(--accent); }
        .ko-game .ko-score { font-weight:700; color:var(--accent); }
        .ko-game .ko-score.pending { color:var(--text2); font-weight:400; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; justify-content:center; align-items:center; padding:16px; }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--surface); border:2px solid var(--accent); border-radius:14px; padding:16px; max-width:460px; width:100%; max-height:85vh; overflow-y:auto; }
        .modal h3 { text-align:center; color:var(--accent); font-size:1.1em; }
        .modal .matchup { display:flex; align-items:center; justify-content:center; gap:12px; margin:12px 0; }
        .modal .team-block { text-align:center; flex:1; }
        .modal .team-block .country { font-weight:700; font-size:.95em; }
        .modal .team-block .owner { font-size:.65em; color:var(--text2); }
        .modal .score-inputs { display:flex; align-items:center; justify-content:center; gap:16px; margin:12px 0; }
        .modal .score-inputs input { width:55px; height:45px; text-align:center; font-size:1.3em; font-weight:700; border:2px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); }
        .modal .btn-row { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
        .btn { padding:8px 16px; border-radius:6px; border:none; cursor:pointer; font-weight:600; font-size:.8em; }
        .btn-save { background:var(--accent); color:#000; }
        .btn-close { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
        .btn-reset { background:var(--loss); color:#fff; font-size:.7em; padding:5px 10px; }
        .filter-info { text-align:center; padding:6px; color:var(--accent); font-size:.8em; }
        .clear-filter { cursor:pointer; text-decoration:underline; color:#58a6ff; margin-left:6px; }
        @media (max-width:768px) { .groups-grid { grid-template-columns:1fr; } .ko-games { grid-template-columns:1fr; } }
    </style>
</head>

                {id:'K25',round:'Quarter-finals',home:'W R16-1',away:'W R16-2',date:'2026-07-08',stadium:'MetLife Stadium',time:'1:00 PM ET',pst:'10:00 AM PST',homeScore:null,awayScore:null,isKo:true},
                {id:'K26',round:'Quarter-finals',home:'W R16-3',away:'W R16-4',date:'2026-07-08',stadium:'AT&T Stadium',time:'4:00 PM CT',pst:'2:00 PM PST',homeScore:null,awayScore:null,isKo:true},
                {id:'K27',round:'Quarter-finals',home:'W R16-5',away:'W R16-6',date:'2026-07-09',stadium:'SoFi Stadium',time:'1:00 PM PT',pst:'1:00 PM PST',homeScore:null,awayScore:null,isKo:true},
                {id:'K28',round:'Quarter-finals',home:'W R16-7',away:'W R16-8',date:'2026-07-10',stadium:'Arrowhead Stadium',time:'1:00 PM CT',pst:'11:00 AM PST',homeScore:null,awayScore:null,isKo:true},
                {id:'K29',round:'Semi-finals',home:'W QF-1',away:'W QF-2',date:'2026-07-14',stadium:'AT&T Stadium',time:'1:00 PM CT',pst:'11:00 AM PST',homeScore:null,awayScore:null,isKo:true},
                {id:'K30',round:'Semi-finals',home:'W QF-3',away:'W QF-4',date:'2026-07-15',stadium:'Mercedes-Benz Stadium',time:'1:00 PM ET',pst:'10:00 AM PST',homeScore:null,awayScore:null,isKo:true},
                {id:'K31',round:'Third Place',home:'L SF-1',away:'L SF-2',date:'2026-07-18',stadium:'Hard Rock Stadium',time:'1:00 PM ET',pst:'10:00 AM PST',homeScore:null,awayScore:null,isKo:true},
                {id:'K32',round:'Final',home:'W SF-1',away:'W SF-2',date:'2026-07-19',stadium:'MetLife Stadium',time:'1:00 PM ET',pst:'10:00 AM PST',homeScore:null,awayScore:null,isKo:true}
            ];

            const allGames = [...allGroupGames, ...allKoGames];

            function loadScores() {
                const saved = localStorage.getItem('wc2026_correct');
                if (saved) {
                    const data = JSON.parse(saved);
                    allGames.forEach(g => {
                        if (data[g.id]) {
                            g.homeScore = data[g.id].homeScore;
                            g.awayScore = data[g.id].awayScore;
                        }
                    });
                }
            }
            function saveScores() {
                const data = {};
                allGames.forEach(g => { data[g.id] = { homeScore:g.homeScore, awayScore:g.awayScore }; });
                localStorage.setItem('wc2026_correct', JSON.stringify(data));
            }
            loadScores();

            let selectedDate = null;
            let currentView = 'groups';

            function renderCalendar() {
                const strip = document.getElementById('calendarStrip');
                const gameDates = new Set(allGames.map(g => g.date));
                const start = new Date(2026, 5, 11);
                const end = new Date(2026, 6, 19);
                const months = ['Jun', 'Jul'];
                let html = '';
                const cur = new Date(start);
                while (cur <= end) {
                    const ds = cur.toISOString().split('T')[0];
                    const has = gameDates.has(ds);
                    const sel = selectedDate === ds;
                    html += `<div class="cal-day${has?' has-games':''}${sel?' selected':''}${ds==='2026-06-13'?' today':''}" data-date="${ds}">
                        <span style="font-size:.5em;">${months[cur.getMonth()-5]}</span><span class="day-num">${cur.getDate()}</span></div>`;
                    cur.setDate(cur.getDate()+1);
                }
                strip.innerHTML = html;
                strip.querySelectorAll('.cal-day').forEach(el => {
                    el.addEventListener('click', () => {
                        selectedDate = selectedDate===el.dataset.date ? null : el.dataset.date;
                        renderCalendar(); renderAll();
                    });
                });
            }

            function calculateStandings(groupId) {
                const teams = GROUPS[groupId];
                const stats = {};
                teams.forEach(t => { stats[t] = { team:t, person:peopleMap[t]||'', gp:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 }; });
                const grpGames = allGroupGames.filter(g => g.group === groupId);
                grpGames.forEach(g => {
                    if (g.homeScore !== null && g.awayScore !== null) {
                        const h = g.home, a = g.away;
                        if (stats[h] && stats[a]) {
                            stats[h].gp++; stats[a].gp++;
                            stats[h].gf += g.homeScore; stats[h].ga += g.awayScore;
                            stats[a].gf += g.awayScore; stats[a].ga += g.homeScore;
                            if (g.homeScore > g.awayScore) { stats[h].w++; stats[h].pts+=3; stats[a].l++; }
                            else if (g.homeScore < g.awayScore) { stats[a].w++; stats[a].pts+=3; stats[h].l++; }
                            else { stats[h].d++; stats[a].d++; stats[h].pts+=1; stats[a].pts+=1; }
                        }
                    }
                });
                Object.values(stats).forEach(s => { s.gd = s.gf - s.ga; });
                return Object.values(stats).sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
            }

            function getFilteredGames() {
                return selectedDate ? allGames.filter(g => g.date === selectedDate) : allGames;
            }

            function renderGroups() {
                const grid = document.getElementById('groupsGrid');
                const filtered = getFilteredGames().filter(g => g.round==='group');
                const fIds = new Set(filtered.map(g => g.id));
                const groupIds = Object.keys(GROUPS).sort();
                let html = '';
                groupIds.forEach(groupId => {
                    const standings = calculateStandings(groupId);
                    const grpGames = allGroupGames.filter(g => g.group === groupId);
                    html += `<div class="group-card"><h3>🏴 Group ${groupId}</h3>
                    <table class="group-standings"><thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
                    standings.forEach(s => {
                        html += `<tr><td>${s.team}<span class="person-name">${s.person}</span></td>
                        <td>${s.gp}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
                        <td>${s.gf}</td><td>${s.ga}</td><td>${s.gd>=0?'+':''}${s.gd}</td>
                        <td class="pts">${s.pts}</td></tr>`;
                    });
                    html += `</tbody></table><div class="group-games">`;
                    grpGames.forEach(game => {
                        const hi = fIds.has(game.id);
                        const scored = game.homeScore !== null && game.awayScore !== null;
                        html += `<div class="game-row" data-game-id="${game.id}" style="${hi?'background:#2a2210;':''}">
                            <span class="teams"><strong>${game.home}</strong> — <strong>${game.away}</strong><br><span style="font-size:.55em;color:var(--text2);">${game.stadium} · ${game.time} (${game.pst})</span></span>
                            <span class="${scored?'score':'score pending'}">${scored?game.homeScore+' - '+game.awayScore:'vs'}</span>
                            <span class="date-sm">${game.date.slice(5)}</span></div>`;
                    });
                    html += `</div></div>`;
                });
                grid.innerHTML = html;
                grid.querySelectorAll('.game-row').forEach(r => r.addEventListener('click', ()=>openGameModal(r.dataset.gameId)));
            }

            function renderKnockout() {
                const container = document.getElementById('knockoutContainer');
                const filtered = getFilteredGames().filter(g => g.isKo);
                const fIds = new Set(filtered.map(g => g.id));
                const rounds = ['Round of 32','Round of 16','Quarter-finals','Semi-finals','Third Place','Final'];
                let html = '';
                rounds.forEach(rn => {
                    const games = allKoGames.filter(g => g.round===rn);
                    if (!games.length) return;
                    html += `<div class="ko-round"><h3>🏆 ${rn}</h3><div class="ko-games">`;
                    games.forEach(game => {
                        const hi = fIds.has(game.id);
                        const sc = game.homeScore!==null && game.awayScore!==null;
                        html += `<div class="ko-game" data-game-id="${game.id}" style="${hi?'border:2px solid var(--accent);background:#2a2210;':''}">
                            <span><strong>${game.home}</strong> vs <strong>${game.away}</strong><br><span style="font-size:.55em;color:var(--text2);">${game.stadium} · ${game.time} (${game.pst})</span></span>
                            <span class="${sc?'ko-score':'ko-score pending'}">${sc?game.homeScore+' - '+game.awayScore:'TBD'}</span>
                            <span style="font-size:.6em;color:var(--text2);">${game.date.slice(5)}</span></div>`;
                    });
                    html += `</div></div>`;
                });
                container.innerHTML = html;
                container.querySelectorAll('.ko-game').forEach(r => r.addEventListener('click', ()=>openGameModal(r.dataset.gameId)));
            }

            function openGameModal(gameId) {
                const game = allGames.find(g => g.id===gameId);
                if (!game) return;
                const overlay = document.getElementById('modalOverlay');
                const modal = document.getElementById('gameModal');
                const hs = game.homeScore!==null ? game.homeScore : '';
                const as = game.awayScore!==null ? game.awayScore : '';
                modal.innerHTML = `
                    <h3>${game.round==='group'?'Group '+game.group+' · ':''}${game.home} vs ${game.away}</h3>
                    <div style="text-align:center;color:var(--text2);font-size:.7em;">📅 ${game.date} | 🏟 ${game.stadium} | 🕐 ${game.time} (${game.pst})</div>
                    <div class="matchup">
                        <div class="team-block"><div style="font-size:1.8em;">⚽</div><div class="country">${game.home}</div><div class="owner">${peopleMap[game.home]||''}</div></div>
                        <div style="font-weight:700;">VS</div>
                        <div class="team-block"><div style="font-size:1.8em;">⚽</div><div class="country">${game.away}</div><div class="owner">${peopleMap[game.away]||''}</div></div>
                    </div>
                    <div class="score-inputs">
                        <input type="number" id="modalHomeScore" value="${hs}" placeholder="-" min="0" max="99">
                        <span>—</span>
                        <input type="number" id="modalAwayScore" value="${as}" placeholder="-" min="0" max="99">
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-save" id="modalSave">💾 Save</button>
                        <button class="btn btn-reset" id="modalReset">Clear</button>
                        <button class="btn btn-close" id="modalClose">Close</button>
                    </div>`;
                overlay.classList.add('open');
                document.getElementById('modalSave').addEventListener('click', () => {
                    const hv = document.getElementById('modalHomeScore').value;
                    const av = document.getElementById('modalAwayScore').value;
                    if (hv!=='' && av!=='' && !isNaN(hv) && !isNaN(av)) { game.homeScore=parseInt(hv); game.awayScore=parseInt(av); }
                    else if (hv==='' && av==='') { game.homeScore=null; game.awayScore=null; }
                    saveScores(); overlay.classList.remove('open'); renderAll();
                });
                document.getElementById('modalReset').addEventListener('click', () => { game.homeScore=null; game.awayScore=null; saveScores(); overlay.classList.remove('open'); renderAll(); });
                document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('open'));
            }
            document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target===this) this.classList.remove('open'); });

            function renderAll() {
                document.getElementById('filterBanner').innerHTML = selectedDate ?
                    `🔍 ${getFilteredGames().length} games on <strong>${selectedDate}</strong> <span class="clear-filter" id="clearFilter">[Show All]</span>` :
                    `📅 ${allGames.length} total matches · Click a date to filter`;
                if (selectedDate) document.getElementById('clearFilter').addEventListener('click', ()=>{ selectedDate=null; renderCalendar(); renderAll(); });
                if (currentView==='groups') renderGroups(); else renderKnockout();
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    currentView = btn.dataset.view;
                    document.getElementById('view-groups').classList.toggle('active', currentView==='groups');
                    document.getElementById('view-knockout').classList.toggle('active', currentView==='knockout');
                    renderAll();
                });
            });

            renderCalendar();
            renderAll();
        })();
    </script>
